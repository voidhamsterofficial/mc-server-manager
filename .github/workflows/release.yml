name: Release

# Builds installers for Windows, macOS, and Linux whenever a version tag
# (v1.2.3) is pushed, and publishes them as a full GitHub release. Because it's
# published and not a prerelease, GitHub marks it as the "Latest" release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # One universal2 build (Intel + Apple Silicon in a single .dmg) so
          # there's just one macOS installer that runs natively on any Mac.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The tauri CLI itself is a devDependency, so it must exist before
      # `npm run tauri build` can do anything.
      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Blockparty ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            **Windows** — run the `.exe` (or `.msi`). SmartScreen may warn since
            the build is unsigned; choose "More info → Run anyway".

            **macOS** — open the `.dmg` and drag Blockparty to Applications.
            The build is unsigned, so macOS says it's "damaged" the first time.
            Fix it once with:
            `xattr -dr com.apple.quarantine /Applications/Blockparty.app`
            (or right-click the app → Open).

            **Linux** — install the `.deb`/`.rpm`, or `chmod +x` the `.AppImage`
            and run it.
          # Publish straight away (not a draft) and not a prerelease, so GitHub
          # tags it "Latest".
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
