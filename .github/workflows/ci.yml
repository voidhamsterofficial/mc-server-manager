name: CI

# Runs the checks the README mandates on every push and PR, so a broken build,
# failing test, clippy error, or type error is caught here instead of mid-release.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check (svelte-check)
        run: npm run check
      - name: Unit tests
        run: npm run test:run
      - name: Build
        run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # `tauri::generate_context!()` embeds the built frontend at compile time,
      # so the crate won't even compile (clippy/test) without ../dist present.
      - name: Build frontend
        run: npm ci && npm run build

      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: test
        run: cargo test --manifest-path src-tauri/Cargo.toml
